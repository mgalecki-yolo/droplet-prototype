<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Droplet – Bulk Selection</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #C8C6C0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 393px;
      height: 852px;
      background: #F2F0EC;
      border-radius: 52px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.12),
        0 32px 96px rgba(0,0,0,0.4),
        0 8px 24px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      flex-shrink: 0;
      height: 54px;
      padding: 14px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-time {
      font-size: 16px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.3px;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-circle {
      width: 42px;
      height: 42px;
      background: white;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .btn-manage {
      height: 42px;
      padding: 0 22px;
      background: white;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #2A2F35;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: background 0.22s ease, color 0.22s ease;
      white-space: nowrap;
    }
    .btn-manage.is-done {
      background: #222A35;
      color: white;
    }

    /* ── Page title ── */
    .page-title {
      flex-shrink: 0;
      padding: 2px 16px 10px;
      font-size: 23px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.5px;
      line-height: 30px;
    }

    /* ── Pill tabs ── */
    .tabs-row, .filter-row {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 0 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-row::-webkit-scrollbar,
    .filter-row::-webkit-scrollbar { display: none; }

    .pill {
      height: 36px;
      padding: 0 12px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      color: #2A2F35;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .pill.active { background: #E3E1DC; box-shadow: none; }
    .pill-count { color: #7B8494; }
    .pill.active .pill-count { color: #2A2F35; }

    /* ── Product list ── */
    .product-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: visible;
      padding: 4px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: none;
    }
    .product-list::-webkit-scrollbar { display: none; }
    .product-list::after {
      content: '';
      display: block;
      height: 104px;
      flex-shrink: 0;
    }

    /* ── Product tile ── */
    .tile {
      position: relative;
      cursor: default;
    }

    /* ── 2. SLIDE-IN ANIMATION ──
       tile-inner slides right; checkbox slides in from left */
    .tile-inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      will-change: transform;
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition-delay: var(--stagger, 0ms);
    }
    .selection-mode .tile-inner {
      transform: translateX(32px);
    }
    /* restore (no stagger on exit for snappy feel) */
    .selection-mode-exit .tile-inner {
      transition-delay: 0ms !important;
    }

    /* ── Checkbox – slides in from left ── */
    .tile-checkbox-wrap {
      position: absolute;
      left: 4px;
      top: 58px;  /* vertically centred-ish inside 140px image */
      opacity: 0;
      transform: translateX(-12px);
      transition:
        opacity 0.22s ease,
        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition-delay: var(--stagger, 0ms);
      z-index: 4;
      cursor: pointer;
    }
    .selection-mode .tile-checkbox-wrap {
      opacity: 1;
      transform: translateX(0);
    }
    .selection-mode-exit .tile-checkbox-wrap {
      transition-delay: 0ms !important;
    }

    .tile-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      box-shadow: 0 1px 5px rgba(0,0,0,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease;
      overflow: hidden;
    }
    .tile.selected .tile-checkbox {
      background: #FF4252;
      border-color: #FF4252;
    }
    /* Figma check icon inside checkbox */
    .tile-checkbox .ico {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.15s ease, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tile.selected .tile-checkbox .ico {
      opacity: 1;
      transform: scale(1);
    }

    /* image wrap */
    .tile-image-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      transition: opacity 0.2s ease;
    }
    .tile-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* selection ring */
    .tile-ring {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 2.5px solid transparent;
      pointer-events: none;
      transition: border-color 0.18s ease;
      z-index: 2;
    }
    .tile.selected .tile-ring { border-color: #FF4252; }

    /* alert badge */
    .alert-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      height: 26px;
      padding: 0 8px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 28px;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      pointer-events: none;
      z-index: 2;
    }
    .alert-badge span {
      font-size: 10px;
      font-weight: 700;
      color: #222A35;
      line-height: 1;
    }

    /* dim unselected in selection mode */
    .selection-mode .tile:not(.selected) .tile-image-wrap { opacity: 0.6; }
    .selection-mode .tile.selected .tile-image-wrap { opacity: 1; }

    /* info side */
    .tile-info {
      flex: 1;
      height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .tile-top { display: flex; flex-direction: column; gap: 6px; }
    .tile-name {
      font-size: 14px;
      font-weight: 600;
      color: #222A35;
      line-height: 1.35;
    }
    .tile-meta {
      font-size: 12px;
      font-weight: 600;
      color: #7B8494;
      line-height: 1.55;
    }
    .tile-price-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tile-price-base {
      font-size: 12px;
      font-weight: 600;
      color: #7B8494;
    }
    .price-badge {
      height: 24px;
      padding: 0 9px;
      background: #DDDBD7;
      border-radius: 37px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .price-badge span {
      font-size: 12px;      /* F60 */
      font-weight: 600;
      color: #222A35;
    }

    /* per-tile action button */
    .tile-btn {
      width: 100%;
      height: 36px;
      background: white;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #2A2F35;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .tile-btn:active { transform: scale(0.97); }
    .selection-mode .tile-btn { opacity: 0; pointer-events: none; }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px 32px;
      background: linear-gradient(to top, #F2F0EC 65%, rgba(242,240,236,0) 100%);
      pointer-events: none;
    }

    /* normal CTA */
    .btn-cta {
      width: 100%;
      height: 52px;
      background: #FF4252;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: white;
      pointer-events: all;
      transition: opacity 0.22s ease, transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .btn-cta.hidden {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    /* ── 3. BULK ACTION BAR ── both buttons full-width, equal ── */
    .bulk-bar {
      position: absolute;
      inset: 10px 16px 32px;
      display: flex;
      gap: 10px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.26s ease, transform 0.26s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .bulk-bar.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .btn-bulk {
      flex: 1;               /* equal widths */
      height: 52px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;      /* B20 */
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn-bulk:active { transform: scale(0.96); }

    /* Delete: white bg, red label */
    .btn-delete {
      background: white;
      color: #FF4252;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    /* Add to Show: red bg, white label */
    .btn-show {
      background: #FF4252;
      color: white;
    }

    /* Figma icon img helper */
    .ico-img {
      display: block;
      flex-shrink: 0;
    }
    /* colorize: dark Figma PNG → red */
    .ico-red {
      filter: brightness(0) invert(36%) sepia(97%) saturate(1500%) hue-rotate(327deg) brightness(108%);
    }
    /* colorize: dark Figma PNG → white */
    .ico-white {
      filter: brightness(0) invert(1);
    }

    /* ══════════════════════════════
       ADD PRODUCTS FLOW
    ══════════════════════════════ */

    /* Full-screen overlay – slides up from bottom */
    .screen-overlay {
      position: absolute;
      inset: 0;
      background: #F2F0EC;
      display: flex;
      flex-direction: column;
      transform: translateY(102%);
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
      border-radius: 52px;
      overflow: hidden;
    }
    .screen-overlay.visible { transform: translateY(0); }

    /* Form screen – slides in from right */
    .form-screen {
      position: absolute;
      inset: 0;
      background: #F2F0EC;
      display: flex;
      flex-direction: column;
      transform: translateX(102%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 60;
      border-radius: 52px;
      overflow: hidden;
    }
    .form-screen.visible { transform: translateX(0); }

    /* Segmented control */
    .seg-control {
      margin: 4px 16px 12px;
      background: #E3E1DC;
      border-radius: 100px;
      padding: 3px;
      display: flex;
      flex-shrink: 0;
    }
    .seg-btn {
      flex: 1;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;    /* F60 */
      color: #7B8494;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      position: relative;
    }
    .seg-btn.active {
      background: white;
      color: #222A35;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .seg-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FF4252;
      color: white;
      font-size: 10px;
      font-weight: 700;
      border-radius: 20px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      margin-left: 5px;
      vertical-align: middle;
      /* override: */
    }

    /* Add panel */
    .add-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* Empty state */
    .media-empty-wrap {
      flex: 1;
      padding: 0 16px;
      display: flex;
      align-items: flex-start;
    }
    .media-empty-box {
      width: 100%;
      border: 1.5px dashed #CCCAC6;
      border-radius: 16px;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .media-empty-icon {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-add-photos {
      height: 40px;
      padding: 0 20px;
      background: white;
      border: none;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #222A35;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .media-empty-hint {
      font-size: 12px;
      font-weight: 400;
      color: #7B8494;
      text-align: center;
      line-height: 1.6;
    }

    /* Photo grid */
    .media-grid-wrap {
      flex: 1;
      padding: 0 16px;
      overflow-y: auto;
      scrollbar-width: none;
      padding-bottom: 100px;
    }
    .media-grid-wrap::-webkit-scrollbar { display: none; }
    .media-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .media-thumb {
      width: 112px;
      height: 112px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .media-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .media-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .media-thumb.selected .media-thumb-overlay { opacity: 1; }
    .media-thumb-radio {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .media-thumb.selected .media-thumb-radio { display: none; }
    .media-thumb-num {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      color: #101828;
      font-size: 11px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .media-thumb.selected .media-thumb-num { display: flex; }
    .media-thumb-play {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .media-add-tile {
      width: 112px;
      height: 112px;
      border: 1px dashed #bcbcbc;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      background: transparent;
      transition: opacity 0.15s ease;
    }
    .media-add-tile:active { opacity: 0.6; }
    .media-add-icon {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .media-add-tile span {
      font-size: 12px;
      font-weight: 600;
      color: #2A2F35;
    }

    /* Drafts list in Add Products */
    .draft-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: white;
      border-radius: 12px;
      margin: 0 16px 8px;
    }
    .draft-item-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .draft-item-img img { width:100%; height:100%; object-fit:cover; }
    .draft-item-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #222A35;
      line-height: 1.35;
    }
    .draft-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-review {
      height: 36px;
      padding: 0 16px;
      background: white;
      border: none;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #222A35;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn-trash-sm {
      width: 36px;
      height: 36px;
      background: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* Add Products bottom bar */
    .add-bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px 32px;
      background: linear-gradient(to top, #F2F0EC 65%, rgba(242,240,236,0) 100%);
      display: flex;
      gap: 10px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.26s ease, transform 0.26s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
    }
    .add-bottom-bar.visible { opacity:1; transform:translateY(0); pointer-events:all; }
    .btn-ap-delete {
      width: 90px;
      height: 52px;
      background: white;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;     /* B20 */
      font-weight: 600;
      color: #222A35;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn-create-product {
      flex: 1;
      height: 52px;
      background: #FF4252;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;     /* B10 */
      font-weight: 600;
      color: white;
    }

    /* Bottom sheet */
    .sheet-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      border-radius: 52px;
    }
    .sheet-overlay.visible { opacity:1; pointer-events:all; }
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #F2F0EC;
      border-radius: 20px 20px 0 0;
      padding: 12px 16px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sheet-overlay.visible .bottom-sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: #CCCAC6;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-size: 16px;
      font-weight: 700;
      color: #222A35;
      text-align: center;
      margin-bottom: 16px;
    }
    .btn-sheet {
      width: 100%;
      height: 52px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;    /* B10 */
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-sheet-red { background:#FF4252; color:white; }
    .btn-sheet-white { background:white; color:#222A35; box-shadow:0 2px 8px rgba(0,0,0,0.06); }

    /* Product form */
    .form-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;

<script>
/* ─── Icons from Figma ─── */
const FIGMA_TRASH = 'https://www.figma.com/api/mcp/asset/0cdc5d4c-06f9-4baa-8dec-2263f95064f3'; // Icon Trash 18px
const FIGMA_CHECK = 'https://www.figma.com/api/mcp/asset/c446f6f5-9349-4b53-a137-659bd0c85e0d'; // Icon Check 18px

const FIGMA_PROTECTION = 'https://www.figma.com/api/mcp/asset/575c4a51-356a-4181-bbda-651ea66f887d'; // Icon Protection 12px

/* ─── Data ─── */

  'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=300&h=300&fit=crop&q=65',
  'https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=300&h=300&fit=crop&q=65',
  'https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=300&h=300&fit=crop&q=65',
];

const allProducts = [
  // ── Active ──
  { id:1,  cat:'active',   type:'buynow',  name:'Airmax Classic 95 white blue red',  size:'Size 42', qty:92,  priceBase:'$90',   badge:'$102.34', prot:true,  image:IMG[0], alerts:34 },
  { id:2,  cat:'active',   type:'auction', name:'Airmax Classic 95 white blue red',  size:'Size 42', qty:92,  priceBase:null,    badge:'From $1', prot:false, image:IMG[1], alerts:34 },
  { id:3,  cat:'active',   type:'auction', name:'Jordan 1 Retro High OG Chicago',    size:'Size 44', qty:12,  priceBase:'$340',  badge:'$410.00', prot:true,  image:IMG[2], alerts:7  },
  { id:4,  cat:'active',   type:'buynow',  name:'New Balance 550 White Green',       size:'Size 41', qty:5,   priceBase:null,    badge:'From $80',prot:false, image:IMG[3], alerts:2  },
  // ── Inactive ──
  { id:5,  cat:'inactive', type:'buynow',  name:'Converse Chuck Taylor All Star',    size:'Size 43', qty:3,   priceBase:'$65',   badge:'$78.00',  prot:false, image:IMG[3], alerts:0  },
  // ── Drafts ──
  { id:6,  cat:'drafts',   type:'buynow',  name:'Adidas Gazelle Indoor beige brown', size:'Size 40', qty:1,   priceBase:null,    badge:'No price',prot:false, image:IMG[2], alerts:0  },
  { id:7,  cat:'drafts',   type:'auction', name:'Puma Suede Classic sneaker',        size:'Size 42', qty:2,   priceBase:null,    badge:'Draft',   prot:false, image:IMG[0], alerts:0  },
  // ── Sold out ──
  { id:8,  cat:'soldout',  type:'buynow',  name:'Nike Dunk Low Retro white black',   size:'Size 43', qty:0,   priceBase:'$120',  badge:'$145.00', prot:true,  image:IMG[1], alerts:12 },
  { id:9,  cat:'soldout',  type:'auction', name:'Vans Old Skool Pro skate shoe',     size:'Size 41', qty:0,   priceBase:null,    badge:'Sold',    prot:false, image:IMG[2], alerts:5  },
  // ── Upcoming ──
  { id:10, cat:'upcoming', type:'auction', name:'Yeezy Boost 350 V2 zebra',          size:'Size 42', qty:1,   priceBase:null,    badge:'Mar 10',  prot:false, image:IMG[0], alerts:0  },
  { id:11, cat:'upcoming', type:'buynow',  name:'Jordan 4 Retro Thunder 2023',       size:'Size 44', qty:3,   priceBase:'$320',  badge:'$380.00', prot:true,  image:IMG[3], alerts:0  },
];

const TILE_BTN = {
  active:   'Add to Show',
  inactive: 'Activate',
  drafts:   'Complete listing',
  soldout:  'Restock',
  upcoming: 'Edit',
};

/* ─── State ─── */
let selectionMode  = false;
let selected       = new Set();
let activeCategory = 'active';
let activeFilter   = 'all';

/* ─── Refs ─── */
const phone       = document.getElementById('phone');
const manageBtn   = document.getElementById('manageBtn');
const productList = document.getElementById('productList');
const ctaBtn      = document.getElementById('ctaBtn');
const bulkBar     = document.getElementById('bulkBar');
const deleteBtn   = document.getElementById('deleteBtn');
const deleteLbl   = document.getElementById('deleteLbl');
const showBtn     = document.getElementById('showBtn');
const showLbl     = document.getElementById('showLbl');
const countChip   = document.getElementById('countChip');

/* ─── Filter products ─── */
function getVisible() {
  return allProducts.filter(p =>
    p.cat === activeCategory &&
    (activeFilter === 'all' || p.type === activeFilter)
  );
}

/* ─── Update filter counts ─── */
function updateFilterCounts() {
  const inCat = allProducts.filter(p => p.cat === activeCategory);
  document.getElementById('cnt-filter-auction').textContent = inCat.filter(p => p.type === 'auction').length;
  document.getElementById('cnt-filter-buynow').textContent  = inCat.filter(p => p.type === 'buynow').length;
}

/* ─── Render tiles ─── */
function render() {
  const products = getVisible();
  productList.innerHTML = '';
  if (!products.length) {
    productList.innerHTML = '<div style="padding:32px 0;text-align:center;color:#7B8494;font-size:14px;font-weight:600;">No products here yet</div>';
    return;
  }
  products.forEach((p, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (selected.has(p.id) ? ' selected' : '');
    tile.dataset.id = p.id;
    // ── staggered CSS variable for slide-in ──
    tile.style.setProperty('--stagger', `${idx * 48}ms`);

    tile.innerHTML = `
      <!-- ── 1. Figma alert icon in badge; checkbox with Figma check icon ── -->
      <div class="tile-checkbox-wrap" data-id="${p.id}">
        <div class="tile-checkbox">
          <div class="ico">
            <img class="ico-img ico-white"
                 src="${FIGMA_CHECK}"
                 width="12" height="12" alt="">
          </div>
        </div>
      </div>

      <div class="tile-inner">
        <div class="tile-image-wrap">
          <img src="${p.image}" alt="${p.name}" loading="lazy">
          <div class="tile-ring"></div>

          <!-- Figma alert badge icon -->
          <div class="alert-badge">
            <div style="width:12px;height:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <img src="${FIGMA_ALERT}" width="11.216" height="11.85" alt="" style="display:block;">
            </div>
            <span>${p.alerts}</span>
          </div>
        </div>

        <div class="tile-info">
          <div class="tile-top">
            <div>
              <div class="tile-name">${p.name}</div>
              <div class="tile-meta">${p.size}<br>Qty: ${p.qty}</div>
            </div>
            <div class="tile-price-row">
              ${p.priceBase ? `<span class="tile-price-base">${p.priceBase}</span>` : ''}
              <div class="price-badge">
                ${p.protected ? `<img src="${FIGMA_PROTECTION}" width="9" height="11" alt="" style="display:block;flex-shrink:0;object-fit:contain;">` : ''}
                <span>${p.badge}</span>
              </div>
            </div>
          </div>
          <button class="tile-btn">${TILE_BTN[p.cat] || 'Add to Show'}</button>
        </div>
      </div>
    `;

    tile.addEventListener('click', () => onTileClick(p.id));
    // checkbox wrap tap also toggles
    tile.querySelector('.tile-checkbox-wrap').addEventListener('click', e => {
      e.stopPropagation();
      onTileClick(p.id);
    });

    productList.appendChild(tile);
  });
}

/* ─── Tile click ─── */
function onTileClick(id) {
  if (!selectionMode) return;
  selected.has(id) ? selected.delete(id) : selected.add(id);
  updateUI();
}

/* ─── Update UI ─── */
function updateUI() {
  const n = selected.size;

  /* update tile selected state */
  document.querySelectorAll('.tile').forEach(tile => {
    const id = +tile.dataset.id;
    tile.classList.toggle('selected', selected.has(id));
  });

  /* ── 3. show bulk bar only at 2+ selections ── */
  if (selectionMode && n >= 2) {
    ctaBtn.classList.add('hidden');
    bulkBar.classList.add('visible');
    deleteLbl.textContent = `Delete (${n})`;
    showLbl.textContent   = `Add to Show (${n})`;
    countChip.classList.remove('visible');
  } else {
    ctaBtn.classList.remove('hidden');
    bulkBar.classList.remove('visible');
    if (selectionMode && n === 1) {
      countChip.textContent = '1 selected — pick more for bulk actions';
      countChip.classList.add('visible');
    } else {
      countChip.classList.remove('visible');
    }
  }
}

/* ─── Manage / Done toggle ─── */
manageBtn.addEventListener('click', () => {
  selectionMode = !selectionMode;
  selected.clear();

  if (selectionMode) {
    manageBtn.textContent = 'Done';
    manageBtn.classList.add('is-done');
    phone.classList.add('selection-mode');
  } else {
    /* snap-back: remove stagger on exit */
    document.querySelectorAll('.tile').forEach(t => {
      t.classList.add('selection-mode-exit');
    });
    phone.classList.remove('selection-mode');
    manageBtn.textContent = 'Manage';
    manageBtn.classList.remove('is-done');
    // clean up exit class after transition
    setTimeout(() => {
      document.querySelectorAll('.tile').forEach(t =>
        t.classList.remove('selection-mode-exit')
      );
    }, 420);
  }
  updateUI();
});

/* ─── Bulk actions ─── */
deleteBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (selected.size < 2) return;
  showToast(`Deleted ${selected.size} products`);
  selected.clear();
  updateUI();
});

showBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (selected.size < 2) return;
  showToast(`Added ${selected.size} products to Show`);
  selected.clear();
  updateUI();
});

/* ─── Toast ─── */
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:absolute; bottom:112px; left:50%; transform:translateX(-50%);
    background:#222A35; color:white; font-size:13px; font-weight:600;
    padding:10px 18px; border-radius:100px; white-space:nowrap; z-index:200;
    animation:fadeUp 2.6s cubic-bezier(0.4,0,0.2,1) forwards;
  `;
  phone.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

const s = document.createElement('style');
s.textContent = `
  @keyframes fadeUp {
    0%   { opacity:0; transform:translateX(-50%) translateY(10px); }
    12%  { opacity:1; transform:translateX(-50%) translateY(0); }
    78%  { opacity:1; transform:translateX(-50%) translateY(0); }
    100% { opacity:0; transform:translateX(-50%) translateY(-6px); }
  }
`;
document.head.appendChild(s);

/* ══════════════════════════════
   ADD PRODUCTS FLOW
══════════════════════════════ */

const addProductsScreen = document.getElementById('addProductsScreen');
const editProductScreen  = document.getElementById('editProductScreen');
const addMediaSheet      = document.getElementById('addMediaSheet');
const mediaEmptyState    = document.getElementById('mediaEmptyState');
const mediaGridWrap      = document.getElementById('mediaGridWrap');
const mediaGrid          = document.getElementById('mediaGrid');
const addBottomBar       = document.getElementById('addBottomBar');
const formPhotoStrip     = document.getElementById('formPhotoStrip');
const draftsList         = document.getElementById('draftsList');
const activeList         = document.getElementById('activeList');

const MEDIA_PHOTOS = [IMG[0], IMG[1], IMG[2], IMG[3], IMG[0], IMG[1], IMG[2], IMG[3], IMG[0]];
let selectedPhotos = [];

/* ── Open Add Products ── */
ctaBtn.addEventListener('click', () => {
  addProductsScreen.classList.add('visible');
  selectedPhotos = [];
  showAddPanel('media');
  renderMediaGrid();
  updateAddBottomBar();
  updateSegDraftBadge();
});

/* ── Close Add Products ── */
document.getElementById('closeAddProducts').addEventListener('click', () => {
  addProductsScreen.classList.remove('visible');
});

/* ── + Add Photos and Videos ── */
document.getElementById('btnAddPhotos').addEventListener('click', () => {
  addMediaSheet.classList.add('visible');
});

/* ── Cancel sheet ── */
document.getElementById('btnCancelSheet').addEventListener('click', () => {
  addMediaSheet.classList.remove('visible');
});

/* ── Upload from Library ── */
document.getElementById('btnUploadLibrary').addEventListener('click', () => {
  addMediaSheet.classList.remove('visible');
  mediaEmptyState.style.display = 'none';
  mediaGridWrap.style.display = '';
  if (selectedPhotos.length === 0) selectedPhotos = [0];
  renderMediaGrid();
  updateAddBottomBar();
});

/* ── Dismiss sheet on backdrop tap ── */
addMediaSheet.addEventListener('click', e => {
  if (e.target === addMediaSheet) addMediaSheet.classList.remove('visible');
});

/* ── Render media photo grid ── */
function renderMediaGrid() {
  mediaGrid.innerHTML = '';
  MEDIA_PHOTOS.forEach((src, i) => {
    const div = document.createElement('div');
    const selIdx = selectedPhotos.indexOf(i);
    div.className = 'media-thumb' + (selIdx !== -1 ? ' selected' : '');
    div.innerHTML = `
      <img src="${src}" alt="">
      <div class="media-thumb-overlay"></div>
      <div class="media-thumb-radio"></div>
      <div class="media-thumb-num">${selIdx !== -1 ? selIdx + 1 : ''}</div>
      <div class="media-thumb-play">
        <svg width="9" height="10" viewBox="0 0 9 10" fill="none">
          <path d="M1.5 1.5l6 3.5-6 3.5V1.5Z" fill="rgba(255,255,255,0.85)"/>
        </svg>
      </div>
    `;
    div.addEventListener('click', () => {
      const idx = selectedPhotos.indexOf(i);
      if (idx !== -1) selectedPhotos.splice(idx, 1);
      else selectedPhotos.push(i);
      renderMediaGrid();
      updateAddBottomBar();
    });
    mediaGrid.appendChild(div);
  });
  const addTile = document.createElement('div');
  addTile.className = 'media-add-tile';
  addTile.innerHTML = `
    <div class="media-add-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v14M1 8h14" stroke="#2A2F35" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </div>
    <span>Add Media</span>
  `;
  addTile.addEventListener('click', () => addMediaSheet.classList.add('visible'));
  mediaGrid.appendChild(addTile);
}

function updateAddBottomBar() {
  const n = selectedPhotos.length;
  addBottomBar.classList.toggle('visible', n > 0);
  const createBtn = document.getElementById('btnCreateProduct');
  if (createBtn) createBtn.textContent = `Create ${n} Product${n !== 1 ? 's' : ''}`;
}

function updateSegDraftBadge() {
  const badge = document.getElementById('segDraftBadge');
  const count = allProducts.filter(p => p.cat === 'drafts').length;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

/* ── Render drafts / active lists in Add Products ── */
function renderAddPanelLists() {
  // Drafts
  const drafts = allProducts.filter(p => p.cat === 'drafts');
  draftsList.innerHTML = drafts.length
    ? drafts.map(p => `
        <div class="draft-item">
          <div class="draft-item-img"><img src="${p.image}" alt=""></div>
          <div class="draft-item-name">${p.name}</div>
          <div class="draft-item-actions">
            <button class="btn-trash-sm">
              <img src="${FIGMA_TRASH}" width="16" height="16" alt="" class="ico-img" style="filter:brightness(0) opacity(0.5)">
            </button>
            <button class="btn-review">Review Product</button>
          </div>
        </div>`).join('')
    : '<p style="padding:32px;text-align:center;color:#7B8494;font-size:14px;font-weight:600;">No drafts yet</p>';

  // Active
  const active = allProducts.filter(p => p.cat === 'active');
  activeList.innerHTML = active.map(p => `
    <div class="draft-item">
      <div class="draft-item-img"><img src="${p.image}" alt=""></div>
      <div class="draft-item-name">${p.name}</div>
      <div class="draft-item-actions">
        <button class="btn-review">View</button>
      </div>
    </div>`).join('');
}

/* ── Segmented control in Add Products ── */
function showAddPanel(seg) {
  document.getElementById('addPanelMedia').style.display  = seg === 'media'  ? '' : 'none';
  document.getElementById('addPanelDrafts').style.display = seg === 'drafts' ? '' : 'none';
  if (seg !== 'media') addBottomBar.classList.remove('visible');
  else updateAddBottomBar();
  if (seg === 'drafts') renderAddPanelLists();
}

document.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showAddPanel(btn.dataset.seg);
  });
});

/* ── Create Product → open form ── */
document.getElementById('btnCreateProduct').addEventListener('click', () => {
  editProductScreen.classList.add('visible');
  formPhotoStrip.innerHTML = selectedPhotos
    .map(i => `<div class="form-photo-thumb"><img src="${MEDIA_PHOTOS[i]}" alt=""></div>`)
    .join('');
  document.getElementById('formTitle').value = '';
  document.getElementById('formBrand').value = '';
  document.getElementById('formSize').value  = '';
  document.getElementById('formPrice').value = '';
});

/* ── Back from form ── */
document.getElementById('backFromForm').addEventListener('click', () => {
  editProductScreen.classList.remove('visible');
});

/* ── Save Draft ── */
document.getElementById('btnSaveDraft').addEventListener('click', () => {
  const title = document.getElementById('formTitle').value.trim() || 'Unnamed Product';
  const size  = document.getElementById('formSize').value.trim();
  const img   = selectedPhotos.length ? MEDIA_PHOTOS[selectedPhotos[0]] : IMG[0];
  allProducts.push({
    id: Date.now(), cat: 'drafts', type: document.getElementById('formType').value,
    name: title, size: size ? `Size ${size}` : 'Size —', qty: 1,
    priceBase: null, badge: 'Draft', prot: false, image: img, alerts: 0,
  });
  document.getElementById('cnt-drafts').textContent = allProducts.filter(p => p.cat === 'drafts').length;
  updateSegDraftBadge();
  showToast('Saved to Drafts');
  editProductScreen.classList.remove('visible');
  setTimeout(() => addProductsScreen.classList.remove('visible'), 280);
  if (activeCategory === 'drafts') { updateFilterCounts(); render(); }
});

/* ── Publish ── */
document.getElementById('btnPublish').addEventListener('click', () => {
  const title = document.getElementById('formTitle').value.trim() || 'New Product';
  const size  = document.getElementById('formSize').value.trim();
  const price = document.getElementById('formPrice').value.trim();
  const type  = document.getElementById('formType').value;
  const img   = selectedPhotos.length ? MEDIA_PHOTOS[selectedPhotos[0]] : IMG[0];
  allProducts.push({
    id: Date.now(), cat: 'active', type,
    name: title, size: size ? `Size ${size}` : 'Size —', qty: 1,
    priceBase: price ? `$${price}` : null,
    badge: price ? `$${(parseFloat(price)*1.2).toFixed(2)}` : 'From $0',
    prot: false, image: img, alerts: 0,
  });
  document.getElementById('cnt-active').textContent = allProducts.filter(p => p.cat === 'active').length;
  showToast('Product published!');
  editProductScreen.classList.remove('visible');
  setTimeout(() => addProductsScreen.classList.remove('visible'), 280);
  if (activeCategory === 'active') { updateFilterCounts(); render(); }
});

/* ─── Tab & filter clicks ─── */
document.querySelectorAll('#tabsRow .pill').forEach(pill => {
  pill.addEventListener('click', () => {
    activeCategory = pill.dataset.cat;
    activeFilter   = 'all';
    document.querySelectorAll('#tabsRow .pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    document.querySelectorAll('#filterRow .pill').forEach(p => p.classList.remove('active'));
    document.querySelector('#filterRow .pill[data-filter="all"]').classList.add('active');
    selected.clear();
    if (selectionMode) {
      selectionMode = false;
      manageBtn.textContent = 'Manage';
      manageBtn.classList.remove('is-done');
      phone.classList.remove('selection-mode');
    }
    updateFilterCounts();
    render();
    updateUI();
  });
});

document.querySelectorAll('#filterRow .pill').forEach(pill => {
  pill.addEventListener('click', () => {
    activeFilter = pill.dataset.filter;
    document.querySelectorAll('#filterRow .pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selected.clear();
    render();
    updateUI();
  });
});

/* ─── Init ─── */
updateFilterCounts();
render();
</script>
</body>
</html>
