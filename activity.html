<!DOCTYPE html>
<html lang="pl">
<head>

<body>

<div class="phone">

<!-- ── Status Bar ── -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx=".5" fill="#000"/><rect x="5" y="4" width="3" height="8" rx=".5" fill="#000"/><rect x="10" y="1" width="3" height="11" rx=".5" fill="#000"/><rect x="15" y="0" width="3" height="12" rx=".5" fill="#000"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#000"/><path d="M3.5 7.5C5 6 6.5 5.2 8 5.2s3 .8 4.5 2.3M1 4.5C3.5 2 5.8 1 8 1s4.5 1 7 3.5" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
    <svg width="27" height="12" viewBox="0 0 27 12"><rect x=".5" y=".5" width="23" height="11" rx="2.5" fill="none" stroke="#000" stroke-opacity=".35"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#000"/><path d="M25 4.5v3a1.5 1.5 0 000-3z" fill="#000" fill-opacity=".4"/></svg>
  </div>
</div>

<div class="screen active" id="screen-activity">
  <div class="placeholder-screen">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="8" width="36" height="32" rx="4"/><path d="M6 16h36M16 8v8M32 8v8M14 24h6M14 32h10M28 24h6"/></svg>
    <span>Activity</span>
    <span style="font-size:13px;font-weight:400">Coming soon</span>
  </div>
</div>

<!-- ── Tab Bar ── -->
<div class="tabbar">
  <div class="tabbar-pill">
    <a class="tab-item" href="index.html">
      <div class="tab-icon"><img src="design-system/UI Icons/Icon Start.svg" alt="Start"></div>
      <span class="tab-label">Start</span>
    </a>
    <a class="tab-item" href="browse.html">
      <div class="tab-icon"><img src="design-system/UI Icons/Icon Browse.svg" alt="Browse"></div>
      <span class="tab-label">Browse</span>
    </a>
    <a class="tab-item" href="sell.html">
      <div class="tab-icon"><img src="design-system/UI Icons/Icon Sell.svg" alt="Sell"></div>
      <span class="tab-label">Sell</span>
    </a>
    <a class="tab-item active" href="activity.html">
      <div class="tab-icon"><img src="design-system/UI Icons/Icon Message.svg" alt="Activity"></div>
      <span class="tab-label">Activity</span>
    </a>
    <a class="tab-item" href="account.html">
      <div class="tab-icon"><img src="design-system/UI Icons/Icon Account.svg" alt="Account"></div>
      <span class="tab-label">Account</span>

  </div>

// No specific JS for activity screen
