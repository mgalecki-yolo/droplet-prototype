<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Droplet — Products</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ── Products-specific styles ── */
.prod-header{position:absolute;top:54px;left:0;right:0;z-index:90;background:linear-gradient(to bottom, rgb(242,240,236) 0%, rgb(242,240,236) 40%, rgba(242,240,236,0.8) 70%, rgba(242,240,236,0) 100%);padding-bottom:16px}
.prod-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px}
.prod-back{width:42px;height:42px;border-radius:296px;background:var(--wh10);border:none;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-interactive);cursor:pointer}
.prod-back:active{opacity:0.7;transform:scale(0.94)}
.prod-manage{height:42px;padding:0 16px;border-radius:296px;background:var(--wh10);display:flex;align-items:center;font-size:16px;font-weight:600;color:var(--bw20);box-shadow:var(--shadow-interactive);cursor:pointer}
.prod-title{padding:15px 16px 8px;font-size:23px;font-weight:600;color:#000;letter-spacing:-0.5px;line-height:30px}
.prod-filters{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.prod-filters::-webkit-scrollbar{display:none}
.prod-filter{display:inline-flex;align-items:center;gap:4px;height:36px;padding:0 12px;border-radius:70px;background:var(--wh10);box-shadow:var(--shadow-interactive);font-size:12px;font-weight:600;color:var(--bw20);white-space:nowrap;border:none;cursor:pointer;flex-shrink:0;font-family:inherit}
.prod-filter.active{background:var(--ov15);box-shadow:none}
.prod-filter .count{color:var(--bw40);margin-left:2px}
.prod-filter.active .count{color:var(--bw20)}
.prod-subfilters{display:flex;gap:2px;padding:0 16px 8px}
.prod-subfilt{display:inline-flex;align-items:center;gap:4px;height:36px;padding:0 12px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--bw40);white-space:nowrap;border-radius:70px;font-family:inherit}
.prod-subfilt.active{background:var(--ov15);color:var(--bw20)}
.prod-subfilt .count{color:var(--bw40)}
.prod-subfilt.active .count{color:var(--bw20)}

/* Product tile */
.prod-tile{display:flex;gap:12px;padding:0 16px;margin-bottom:16px}
.prod-thumb{width:140px;height:140px;border-radius:12px;overflow:hidden;flex-shrink:0;position:relative;box-shadow:var(--shadow-show)}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
.prod-bookmark{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:4px;background:var(--bw10);border:1px solid rgba(255,255,255,0.3);border-radius:28px;padding:0 8px;height:26px;box-shadow:0 3.8px 15px rgba(255,255,255,0.3),0 1.9px 3.8px rgba(0,0,0,0.1)}
.prod-bookmark svg{width:12px;height:12px}
.prod-bookmark span{font-size:10px;font-weight:700;color:var(--wh10)}
.prod-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.prod-name{font-size:14px;font-weight:600;color:var(--bw30);line-height:100%}
.prod-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.prod-badge{display:inline-flex;align-items:center;gap:3px;height:24px;padding:0 8px;border-radius:37px;font-size:12px;font-weight:600;line-height:100%}
.prod-badge.stroke{border:1px solid var(--gw20);color:var(--bw40);background:none}
.prod-badge.filled{background:var(--gw20);color:var(--bw30)}
.prod-badge.auction{background:var(--gw20);color:rgba(0,0,0,0.75)}
.prod-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.prod-action-btn{width:36px;height:36px;border-radius:70px;border:none;background:var(--wh10);box-shadow:var(--shadow-interactive);display:flex;align-items:center;justify-content:center;cursor:pointer}
.prod-action-btn:active{opacity:0.7;transform:scale(0.94)}
.prod-edit-btn{flex:1;height:36px;border-radius:70px;border:none;background:var(--wh10);box-shadow:var(--shadow-interactive);font-size:12px;font-weight:600;color:var(--bw20);font-family:inherit;cursor:pointer}
.prod-edit-btn:active{opacity:0.7;transform:scale(0.94)}

/* Bottom CTA */
.prod-bottom{position:absolute;bottom:0;left:0;right:0;padding:0 16px 34px;z-index:50;background:linear-gradient(to bottom,rgba(242,240,236,0) 0%,var(--ov40) 40%)}
.prod-bottom-btn{width:100%;height:52px;border-radius:70px;border:none;background:var(--rd10);color:#fff;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--shadow-interactive)}
.prod-bottom-btn:active{opacity:0.85;transform:scale(0.98)}
</style>
</head>

document.querySelectorAll('.prod-filter').forEach(btn => {

  });
});
document.querySelectorAll('.prod-subfilt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.prod-subfilt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Scroll header — show centered title when big title scrolls out of view
var prodScroll = document.querySelector('.screen-scroll');
var prodScrollTitle = document.getElementById('prod-scroll-title');
if (prodScroll && prodScrollTitle) {
  prodScroll.addEventListener('scroll', function() {
    prodScrollTitle.style.opacity = prodScroll.scrollTop > 40 ? '1' : '0';
  });
}
